version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: timetable_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timetable_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: timetable_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timetable_bot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/timetable_bot?schema=public
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SCREENSHOT_CACHE_DURATION: ${SCREENSHOT_CACHE_DURATION:-600000}
      SCREENSHOT_QUALITY: ${SCREENSHOT_QUALITY:-85}
      PUPPETEER_CONCURRENCY: ${PUPPETEER_CONCURRENCY:-7}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./screenshots:/app/screenshots
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

volumes:
  postgres_data:
  redis_data:
